<!DOCTYPE html>
<html lang="bn" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    
    <!-- SEO & Indexing Meta: গুগল ইনডেক্স নিশ্চিত করার জন্য -->
    <title>সুরভীর সাথে কথা বলুন - ফাস্ট সার্ভিস প্যাকেজ</title>
    <meta name="description" content="সুরভীর সাথে সরাসরি কথা বলতে আপনার পছন্দের প্যাকেজটি বেছে নিন। দ্রুততম এবং বিশ্বস্ত অনলাইন সার্ভিস।">
    <meta name="keywords" content="Voice Call, Service Package, সুরভী, অনলাইন সার্ভিস, পেমেন্ট বিকাশ নগদ">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Suravi">
    
    <!-- Open Graph: সোশ্যাল মিডিয়া শেয়ারিং এর জন্য -->
    <meta property="og:title" content="সুরভীর সাথে কথা বলুন">
    <meta property="og:description" content="সেরা সার্ভিস প্যাকেজ বাছাই করুন।">
    <meta property="og:image" content="https://github.com/pj9889/fdfd/blob/main/profile.jpg?raw=true">
    
    <style>
        /* দ্রুত লোড হওয়ার জন্য আপনার পছন্দের স্টাইল */
        :root { --main-pink: #ff0066; --nagad-orange: #f7941d; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; color: #333; line-height: 1.5; }
        
        .img-placeholder { background: #eee; border-radius: 15px; overflow: hidden; }
        .audio-card { background: #fff; margin: 12px; padding: 12px; border-radius: 18px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .audio-card img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--main-pink); object-fit: cover; }
        
        audio { width: 100%; height: 32px; filter: hue-rotate(290deg); }
        .image-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .image-container img { width: 100%; border-radius: 12px; aspect-ratio: 3/4; object-fit: cover; }
        .section-title { padding-left: 10px; border-left: 4px solid var(--main-pink); margin: 20px 10px 10px; font-weight: 700; }
        .list-box { background: #fff; margin: 10px; border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        .item { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s; }
        .item:active { background: #fff0f5; }
        .buy-btn { display: block; width: 92%; margin: 20px auto; padding: 16px; background: #e11d48; color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: 700; box-shadow: 0 4px 12px rgba(225,29,72,0.3); }

        /* Payment UI */
        #paymentPage { display: none; padding: 15px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .tab { padding: 8px; border-radius: 10px; border: 2px solid transparent; opacity: 0.4; transition: 0.3s; }
        .tab.active { opacity: 1; border-color: var(--main-pink); background: #fff; }
        .card { padding: 20px; border-radius: 20px; color: #fff; }
        .bkash { background: #d12053; }
        .nagad { background: var(--nagad-orange); }
        .white-inner { background: #fff; color: #000; border-radius: 12px; padding: 15px; margin: 12px 0; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #ddd; margin-top: 8px; box-sizing: border-box; }
        .submit { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<main id="mainPage">
    <div class="audio-card">
        <img src="https://github.com/pj9889/fdfd/blob/main/profile.jpg?raw=true" alt="Suravi" loading="eager">
        <div style="flex:1">
            <p style="margin:0 0 5px; font-size:14px; font-weight:600">ভয়েস রেকর্ড শুনুন 🎧</p>
            <audio controls><source src="https://github.com/pj9889/fffff/raw/refs/heads/main/audio.mpeg"></audio>
        </div>
    </div>

    <div class="image-container">
        <img src="https://github.com/pj9889/fffff/blob/main/surovi1.jpeg?raw=true" alt="Service 1" loading="lazy">
        <img src="https://github.com/pj9889/fffff/blob/main/surovi2.jpeg?raw=true" alt="Service 2" loading="lazy">
    </div>

    <div class="section-title">প্যাকেজ বাছাই করুন</div>
    <div class="list-box">
        <div class="item" onclick="sel(150,0)"><span>৩ মিনিট - ১৫০ টাকা</span><input type="radio" name="p"></div>
        <div class="item" onclick="sel(250,1)"><span>৫ মিনিট - ২৫০ টাকা</span><input type="radio" name="p"></div>
        <div class="item" onclick="sel(400,2)"><span>১০ মিনিট - ৪০০ টাকা</span><input type="radio" name="p"></div>
    </div>

    <div id="mBox" style="display:none">
        <div class="section-title">মেসেঞ্জার বাছাই করুন</div>
        <div class="list-box">
            <div class="item" onclick="setM('WhatsApp',0)"><span>WhatsApp</span><input type="radio" name="m"></div>
            <div class="item" onclick="setM('Telegram',1)"><span>Telegram</span><input type="radio" name="m"></div>
        </div>
        <div style="padding:10px" id="iArea">
            <input type="text" id="uInp" placeholder="আপনার আইডি বা নাম্বার">
        </div>
    </div>

    <button class="buy-btn" onclick="goPay()">সার্ভিস কিনুন</button>
</main>

<div id="paymentPage">
    <div class="tabs">
        <div id="tB" class="tab active" onclick="sw('b')"><img src="https://github.com/pj9889/fffff/blob/main/bksh.png?raw=true" width="50" alt="bKash"></div>
        <div id="tN" class="tab" onclick="sw('n')"><img src="https://github.com/pj9889/nagad/raw/refs/heads/main/nagas.jfif" width="50" style="border-radius:8px" alt="Nagad"></div>
    </div>

    <div id="bA" class="card bkash">
        <strong>বিকাশ পার্সোনাল</strong>
        <div class="white-inner">
            <p>নাম্বার: <b>01625575447</b></p>
            <p>টাকা: <span class="amt"></span></p>
        </div>
        <input type="text" class="tx" placeholder="বিকাশ ট্রানজেকশন আইডি">
        <button class="submit" style="background:#006156;color:#fff" onclick="done(this)">পেমেন্ট ভেরিফাই করুন</button>
    </div>

    <div id="nA" class="card nagad" style="display:none">
        <strong>নগদ পার্সোনাল</strong>
        <div class="white-inner">
            <p>নাম্বার: <b>01625575447</b></p>
            <p>টাকা: <span class="amt"></span></p>
        </div>
        <input type="text" class="tx" placeholder="নগদ ট্রানজেকশন আইডি">
        <button class="submit" style="background:#fff;color:#f7941d" onclick="done(this)">পেমেন্ট ভেরিফাই করুন</button>
    </div>
</div>

<script>
    let a=0, m="", u="";
    function sel(p,i){ a=p; document.getElementsByName("p")[i].checked=true; document.getElementById("mBox").style.display="block"; }
    function setM(n,i){ m=n; document.getElementsByName("m")[i].checked=true; }
    function sw(t){
        document.getElementById("bA").style.display = t=='b'?'block':'none';
        document.getElementById("nA").style.display = t=='n'?'block':'none';
        document.getElementById("tB").className = t=='b'?'tab active':'tab';
        document.getElementById("tN").className = t=='n'?'tab active':'tab';
    }
    function goPay(){
        u = document.getElementById("uInp").value;
        if(!a || !m || !u) return alert("সব তথ্য দিন");
        document.getElementById("mainPage").style.display="none";
        document.getElementById("paymentPage").style.display="block";
        document.querySelectorAll(".amt").forEach(e => e.innerText = a + " টাকা");
    }
    function done(btn){
        btn.innerText = "অপেক্ষা করুন...";
        setTimeout(() => {
            window.location.href = "https://www.profitablecpmratenetwork.com/d9ddk3mpd?key=a83df7bf6b76513961a1bd323c24892b";
        }, 1500);
    }
</script>
</body>
</html>
